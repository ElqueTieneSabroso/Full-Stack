<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>

<!-- FORM -->
<form id="task-form">
  <input id="task-input" placeholder="Task" required>
  <select id="priority-input">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>
  <button>Add</button>
</form>

<!-- TABLE -->
<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Task</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="task-list"></tbody>
</table>

<!-- MODAL -->
<div class="modal fade" id="editTaskModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <form id="edit-task-form">

        <div class="modal-header">
          <h5>Edit Task</h5>
        </div>

        <div class="modal-body">
          <input type="hidden" id="edit-task-id">

          <input id="edit-task-title" class="form-control mb-2">

          <select id="edit-task-priority" class="form-select mb-2">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>

          <input type="checkbox" id="edit-task-completed"> Completed
        </div>

        <div class="modal-footer">
          <button class="btn btn-primary">Save</button>
        </div>

      </form>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="task-toast" class="toast">
    <div class="toast-body" id="task-toast-message"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
